version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: vanopt-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: vanopt
      MYSQL_USER: vanoptuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - vanopt-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vanopt-data: